<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Para Gabriel ❤️</title>

<style>
body{
margin:0;
background:linear-gradient(135deg,#0f0f0f,#3d0b1f);
color:white;
font-family:Arial,sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
}

.contenedor{
max-width:700px;
padding:30px;
}

h1{
font-size:45px;
}

h2{
color:#ffb6c1;
}

p{
font-size:22px;
line-height:1.6;
}

.corazon{
font-size:45px;
animation:latido 1s infinite;
}

@keyframes latido{
0%{transform:scale(1);}
50%{transform:scale(1.2);}
100%{transform:scale(1);}
}
</style>

</head>

<body>

<div class="contenedor">

<div class="corazon">❤️</div>

<h1>Para Gabriel</h1>

<h2>Desde el 05/08/2017</h2>

<p>
Hace nueve años llegaste a mi vida...
</p>

<p>
Y desde entonces descubrí que el hogar no es un lugar, sino una persona.
</p>

<p>
Gracias por elegir caminar conmigo todos estos años.
</p>

<p>
Te amo con todo mi corazón.
</p>

<div class="corazon">❤️</div>

</div>

</body>
</html>
